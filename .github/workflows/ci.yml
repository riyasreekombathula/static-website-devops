name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Show Files
        run: ls -la

      - name: Check HTML File
        run: |
          if [ -f index.html ]; then
            echo "HTML file exists ✅"
          else
            echo "HTML file missing ❌"
            exit 1
          fi